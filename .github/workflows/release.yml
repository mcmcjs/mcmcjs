name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # for npm OIDC trusted publishing (and its automatic provenance)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm build
      # Publishing authenticates via OIDC trusted publishing, configured per package
      # on npmjs.com against this repo and workflow, so no npm token is involved and
      # provenance is attested automatically. Pre-creating .npmrc stops the changesets
      # action from injecting a token line that would shadow the OIDC exchange.
      - run: echo "registry=https://registry.npmjs.org/" > ~/.npmrc
      # While changesets are pending, this opens or updates the release PR.
      # When that PR is merged (no changesets left), it publishes the changed
      # packages to npm, pushes per-package tags (name@version), and creates a
      # GitHub Release per package.
      - id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: "Release the next package versions"
          commit: "version packages"
          commitMode: github-api # signed, verified version commits and tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # The action's title input is static, so refine it with the actual versions
      # parsed from the release PR body (the "## name@version" headers it wrote).
      - name: Add versions to the release PR title
        if: steps.changesets.outputs.pullRequestNumber != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: |
          versions=$(gh pr view "$PR" --json body --jq '.body' \
            | grep -oE '^## .+@[0-9]+\.[0-9]+\.[0-9]+' | sed 's/^## //' | paste -sd, - | sed 's/,/, /g')
          if [ -n "$versions" ]; then
            gh pr edit "$PR" --title "Release: $versions"
          fi
