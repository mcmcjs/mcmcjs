name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # As changesets accumulate, this opens/updates a "Release packages" PR.
      # Publishing is intentionally NOT enabled yet. For the first real release:
      #   1. add the NPM_TOKEN repository secret,
      #   2. add `publish: pnpm release` to the `with:` block below,
      #   3. add `id-token: write` to permissions and the env vars
      #      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} and NPM_CONFIG_PROVENANCE: "true".
      - uses: changesets/action@v1
        with:
          version: pnpm version-packages
          title: "Release packages"
          commit: "release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
