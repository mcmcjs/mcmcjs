name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # for npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm build
      # While changesets are pending, this opens or updates the release PR.
      # When that PR is merged (no changesets left), it publishes the changed
      # packages to npm with provenance, pushes per-package tags (name@version),
      # and creates a GitHub Release per package. Requires the NPM_TOKEN secret.
      - id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: "Release the next package versions"
          commit: "version packages"
          commitMode: github-api # signed, verified version commits and tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
      # The action's title input is static, so refine it with the actual versions
      # parsed from the release PR body (the "## name@version" headers it wrote).
      - name: Add versions to the release PR title
        if: steps.changesets.outputs.pullRequestNumber != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: |
          versions=$(gh pr view "$PR" --json body --jq '.body' \
            | grep -oE '^## .+@[0-9]+\.[0-9]+\.[0-9]+' | sed 's/^## //' | paste -sd, - | sed 's/,/, /g')
          if [ -n "$versions" ]; then
            gh pr edit "$PR" --title "Release: $versions"
          fi
