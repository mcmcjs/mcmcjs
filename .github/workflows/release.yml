name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # for npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # While changesets are pending → opens/updates the "Release packages" PR.
      # When that PR is merged (no changesets left) → publishes the changed packages
      # to npm with provenance, pushes per-package tags (name@version), and creates
      # a GitHub Release per package. Requires the NPM_TOKEN repository secret.
      - uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: "Release packages"
          commit: "release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
